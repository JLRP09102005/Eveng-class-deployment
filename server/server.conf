# ============================================================
#  server.conf — Configuracion del servidor Ubuntu EVE-NG Lab
#  Leido por: setup-samba.sh y listener.sh
# ============================================================

# ── Red ─────────────────────────────────────────────────────
SERVER_IP="192.168.0.100"         # IP estatica del servidor Ubuntu
LISTENER_PORT="8080"              # Puerto HTTP del listener

# ── Rutas ───────────────────────────────────────────────────
BASE_DIR="/srv/eveng"             # Directorio raiz del proyecto
SHARES_DIR="/srv/eveng/shares"    # Carpetas de los alumnos
TEMPLATE_DIR="/srv/eveng/template" # Plantilla .vhdx e ISO
LOGS_DIR="/srv/eveng/logs"        # Logs del listener

# ── Samba ───────────────────────────────────────────────────
SAMBA_WORKGROUP="WORKGROUP"       # Grupo de trabajo de la red del aula

# ── Ficheros de datos ────────────────────────────────────────
CREDENTIALS_FILE="/srv/eveng/credentials.json"  # Solo root puede leerlo

# ── Plantilla ────────────────────────────────────────────────
TEMPLATE_VHDX="eve-ng-base.vhdx"  # Nombre del fichero .vhdx plantilla
TEMPLATE_ISO="eve-ce-6.2.0-4-full.iso" # Nombre de la ISO de EVE-NG